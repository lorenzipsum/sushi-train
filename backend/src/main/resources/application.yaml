spring:
  application:
    name: Sushi Train Backend
  profiles:
    group:
      demo-mode: local
      show-sql: local
  jpa:
    # Here explicitly disabling of "Open EntityManager in View" (aka Open Session in View): if enabled, keeps the JPA EntityManager open for the whole web request,
    # which can hide N+1 issues and cause lazy-loading during JSON serialization. Prefer explicit transactional boundaries in service layer.
    # - Spring Boot property reference: https://docs.spring.io/spring-boot/appendix/application-properties/index.html#application-properties.data.spring.jpa.open-in-view
    open-in-view: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  plate-expiry:
    # Auto-expire old plates.
    enabled: true
    # fixedDelay = wait THIS long after a run finishes before starting the next one
    fixed-delay: 30s
    # optional: wait a bit after startup before the first run
    initial-delay: 10s
  data-integrity-repair:
    # Safety net: repairs known DB inconsistencies (disabled by default).
    enabled: false
    # Run every 5 minutes when enabled.
    fixed-delay: 5m
    # Wait after startup before first repair run.
    initial-delay: 30s
  belt:
    placement:
      # Enforce spacing between newly placed plates on the belt.
      min-empty-slots-between-new-plates: 5
      # API-level cap for creating plates in a single request.
      max-new-plates-per-request: 10
