services:
  postgres:
    image: postgres:17
    container_name: sushi-train-postgres
    environment:
      POSTGRES_DB: sushitrain
      POSTGRES_USER: sushitrain
      POSTGRES_PASSWORD: sushitrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sushitrain -d sushitrain"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sushi-train-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/sushitrain
      DB_USER: sushitrain
      DB_PASSWORD: sushitrain
    ports:
      - "8088:8080"
    restart: unless-stopped

  # frontend:
  #   image: your-frontend-image
  #   depends_on:
  #     - backend
  #   ports:
  #     - "4200:80"
  #   restart: unless-stopped

volumes:
  postgres_data:
