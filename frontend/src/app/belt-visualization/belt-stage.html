<section
  class="belt-stage"
  [class.belt-stage--paused]="paused()"
  [class.belt-stage--reduced]="reducedMotion()"
  [class.belt-stage--degraded]="degraded()"
  [style.--plate-size.px]="stage().plateSizePx"
  [style.--slot-size.px]="stage().slotMarkerSizePx"
  [style.--seat-size.px]="stage().seatSizePx"
  [attr.aria-label]="stage().beltName"
>
  <div class="belt-stage__counter">
    <div class="belt-stage__track">
      <div class="belt-stage__lane belt-stage__lane--shadow" aria-hidden="true"></div>
      <div class="belt-stage__lane belt-stage__lane--belt" aria-hidden="true"></div>
      <div class="belt-stage__lane belt-stage__lane--inner" aria-hidden="true">
        <div class="belt-stage__kitchen">
          <div class="belt-stage__kitchen-island"></div>
          <div class="belt-stage__pass"></div>
          @if (stage().kitchen.showChef) {
            <div class="belt-stage__chef" [attr.title]="stage().kitchen.chefLabel">
              <span class="belt-stage__chef-hat"></span>
              <span class="belt-stage__chef-head">
                <span class="belt-stage__chef-eyes"></span>
                <span class="belt-stage__chef-smile"></span>
              </span>
              <span class="belt-stage__chef-body">
                <span class="belt-stage__chef-scarf"></span>
              </span>
              <span class="belt-stage__chef-arms"></span>
              <span class="belt-stage__chef-knife"></span>
            </div>
          }
          <div
            class="belt-stage__prep belt-stage__prep--board"
            [attr.title]="stage().kitchen.accentLabels[0]"
          ></div>
          <div
            class="belt-stage__prep belt-stage__prep--lamp"
            [attr.title]="stage().kitchen.accentLabels[1]"
          ></div>
          <div
            class="belt-stage__prep belt-stage__prep--tray"
            [attr.title]="stage().kitchen.accentLabels[2]"
          ></div>
          <div class="belt-stage__prep belt-stage__prep--mat"></div>
          <div class="belt-stage__prep belt-stage__prep--nigiri"></div>
        </div>
      </div>

      @for (slot of stage().slots; track slot.id) {
        <div
          class="slot"
          [class.slot--occupied]="!!slot.plate"
          [class.slot--reduced]="reducedMotion()"
          [style.left.%]="slot.xPercent"
          [style.top.%]="slot.yPercent"
          [style.transform]="'translate(-50%, -50%) rotate(' + slot.tangentDeg + 'deg)'"
          [attr.aria-label]="slot.ariaLabel"
          [attr.title]="slot.ariaLabel"
        >
          <span class="slot__marker"></span>

          @if (slot.plate; as plate) {
            <span class="plate" [class]="plate.className">
              <span class="plate__rim"></span>
              <span class="plate__center"></span>
              <span class="food" [class]="plate.foodClassName">
                <span class="food__base"></span>
                <span class="food__topping"></span>
                <span class="food__accent"></span>
              </span>
            </span>
          }
        </div>
      }
    </div>

    <div class="belt-stage__seat-row">
      @for (seat of stage().seats; track seat.id) {
        @if (seat.isActionable) {
          <button
            type="button"
            class="seat seat--actionable"
            [class.seat--occupied]="seat.isOccupied"
            [class.seat--pending]="seat.isPending"
            [style.left.%]="seat.xPercent"
            [style.top.%]="seat.yPercent"
            [style.transform]="'translate(-50%, -50%) rotate(' + seat.facingDeg + 'deg)'"
            [attr.aria-label]="seat.ariaLabel"
            [attr.title]="seat.ariaLabel"
            (click)="handleSeatClick(seat)"
          >
            <span class="seat__frame" aria-hidden="true"></span>
            <span class="seat__cushion" aria-hidden="true"></span>
            <span class="seat__label" aria-hidden="true">{{ seat.label }}</span>
          </button>
        } @else {
          <div
            class="seat"
            [class.seat--occupied]="seat.isOccupied"
            [class.seat--pending]="seat.isPending"
            [style.left.%]="seat.xPercent"
            [style.top.%]="seat.yPercent"
            [style.transform]="'translate(-50%, -50%) rotate(' + seat.facingDeg + 'deg)'"
            [attr.aria-label]="seat.ariaLabel"
            [attr.title]="seat.ariaLabel"
          >
            <span class="seat__frame" aria-hidden="true"></span>
            <span class="seat__cushion" aria-hidden="true"></span>
            <span class="seat__label" aria-hidden="true">{{ seat.label }}</span>
            @if (seat.isOccupied) {
              <span class="seat__guest" aria-hidden="true">
                <span class="seat__guest-knot"></span>
                <span class="seat__guest-head"></span>
                <span class="seat__guest-body"></span>
              </span>
            }
          </div>
        }
      }
    </div>
  </div>
</section>
